<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>プロフィール | おきとーーーーーーく</title>

    <!-- 共通ヘッダー -->
    <link
        rel="stylesheet"
        href="../../css/header.css"
    >

    <!-- 共通ボタン -->
    <link
        rel="stylesheet"
        href="../../css/button.css"
    >

    <!-- プロフィール画面専用 -->
    <link
        rel="stylesheet"
        href="../../css/pages/profile.css"
    >
</head>

<body>

    <!-- 共通ヘッダー -->
    <header class="site-header">

        <div class="header-inner">

            <a
                href="../home.html"
                class="site-logo"
            >
                おきとーーーーーーく
            </a>

            <nav class="header-nav">

                <a
                    href="../home.html"
                    class="header-link"
                >
                    ホーム
                </a>

                <a
                    href="#"
                    class="header-link"
                >
                    通知
                </a>

                <a
                    href="profile.html"
                    class="header-link"
                >
                    プロフィール
                </a>

            </nav>

        </div>

    </header>

    <main class="profile-page">

        <section class="profile-card">

            <div class="profile-cover"></div>

            <div class="profile-content">

                <div class="profile-top">

                    <div class="profile-icon">
                        沖
                    </div>

                    <button
                        type="button"
                        class="button edit-button"
                    >
                        プロフィール編集
                    </button>

                </div>

                <div class="profile-information">

                    <h1 class="profile-name">
                        沖縄 太郎
                    </h1>

                    <p class="profile-id">
                        @okinawa_taro
                    </p>

                    <p class="profile-description">
                        沖縄の海とカフェが好きです。<br>
                        地元のおすすめ情報を発信します！
                    </p>

                    <div class="profile-meta">

                        <span>
                            📍 那覇市
                        </span>

                        <span>
                            📅 2026年7月から利用
                        </span>

                    </div>

                    <div class="profile-count">

                        <a href="#">
                            <strong>120</strong>
                            フォロー中
                        </a>

                        <a href="#">
                            <strong>86</strong>
                            フォロワー
                        </a>

                    </div>

                </div>

            </div>

        </section>

        <section class="profile-posts">

            <div class="profile-tabs">

                <button
                    type="button"
                    class="profile-tab active"
                >
                    投稿
                </button>

                <button
                    type="button"
                    class="profile-tab"
                >
                    いいね
                </button>

            </div>

            <article class="post-card">

                <div class="post-icon">
                    沖
                </div>

                <div class="post-content">

                    <div class="post-header">

                        <strong>
                            沖縄 太郎
                        </strong>

                        <span>
                            @okinawa_taro
                        </span>

                        <span>
                            ・10分前
                        </span>

                    </div>

                    <p>
                        今日の那覇は天気が良くて気持ちいいです！
                    </p>

                    <p class="post-location">
                        📍 那覇市
                    </p>

                </div>

            </article>

            <article class="post-card">

                <div class="post-icon">
                    沖
                </div>

                <div class="post-content">

                    <div class="post-header">

                        <strong>
                            沖縄 太郎
                        </strong>

                        <span>
                            @okinawa_taro
                        </span>

                        <span>
                            ・1日前
                        </span>

                    </div>

                    <p>
                        沖縄そばを食べてきました。三枚肉が最高でした！
                    </p>

                    <p class="post-location">
                        📍 浦添市
                    </p>

                </div>

            </article>

        </section>

    </main>

</body>

</html>
