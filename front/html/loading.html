<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>おきとーーーーーーく</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family:
                "Yu Gothic",
                "Hiragino Kaku Gothic ProN",
                sans-serif;
        }

        /* =========================
           ローディング画面全体
        ========================= */

        #loading {
            position: fixed;
            inset: 0;
            z-index: 9999;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            overflow: hidden;

            background: linear-gradient(
                to bottom,
                #7edcff 0%,
                #bcefff 45%,
                #6bd9da 72%,
                #25b8ca 100%
            );

            transition:
                opacity 0.6s ease,
                visibility 0.6s ease;
        }

        #loading.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* =========================
           中央コンテンツ
        ========================= */

        .loading-content {
            position: relative;
            z-index: 3;

            display: flex;
            align-items: center;
            flex-direction: column;

            width: 100%;
            padding: 30px 20px 150px;
            text-align: center;
        }

        /* =========================
           ハイビスカス
        ========================= */

        .flower {
            width: 180px;
            max-width: 45vw;
            height: auto;

            animation: flowerMove 2.5s ease-in-out infinite;
        }

        .flower.stop {
            animation-play-state: paused;
        }

        @keyframes flowerMove {
            0% {
                transform:
                    translateY(0)
                    rotate(-5deg)
                    scale(1);
            }

            25% {
                transform:
                    translateY(-15px)
                    rotate(5deg)
                    scale(1.04);
            }

            50% {
                transform:
                    translateY(-35px)
                    rotate(-5deg)
                    scale(1.08);
            }

            75% {
                transform:
                    translateY(-15px)
                    rotate(5deg)
                    scale(1.04);
            }

            100% {
                transform:
                    translateY(0)
                    rotate(-5deg)
                    scale(1);
            }
        }

        /* =========================
           メッセージ
        ========================= */

        .loading-text {
            min-height: 42px;
            margin-top: 25px;

            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.05em;

            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.28);

            transition:
                opacity 0.3s ease,
                transform 0.3s ease;
        }

        .loading-text.change {
            opacity: 0;
            transform: translateY(8px);
        }

        /* =========================
           波
        ========================= */

        .wave-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;

            z-index: 1;

            width: 100%;
            height: 190px;

            overflow: hidden;
        }

        .wave {
            position: absolute;
            bottom: -5px;
            left: 0;

            width: 200%;
            min-width: 1600px;
            height: 190px;

            object-fit: cover;

            animation: waveMove 10s linear infinite;
        }

        @keyframes waveMove {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        /* =========================
           完了後のボタン
        ========================= */

        #startButton {
            display: none;
            margin-top: 38px;
        }

        #startButton.show {
            display: block;
            animation: showButton 0.8s ease forwards;
        }

        @keyframes showButton {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .type--C {
            --line_color: #00135c;
            --back_color: #defffa;
        }

        .button {
            position: relative;
            z-index: 0;

            width: 260px;
            height: 56px;

            padding: 0;
            border: none;
            background: transparent;

            color: var(--line_color);
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-decoration: none;

            cursor: pointer;

            transition: all 0.3s ease;
        }

        .button__text {
            display: flex;
            justify-content: center;
            align-items: center;

            width: 100%;
            height: 100%;
        }

        .button::before,
        .button::after,
        .button__text::before,
        .button__text::after {
            content: "";

            position: absolute;

            height: 3px;
            border-radius: 2px;

            background: var(--line_color);

            transition: all 0.5s ease;
        }

        .button::before {
            top: 0;
            left: 54px;

            width: calc(100% - 56px * 2 - 16px);
        }

        .button::after {
            top: 0;
            right: 54px;

            width: 8px;
        }

        .button__text::before {
            right: 54px;
            bottom: 0;

            width: calc(100% - 56px * 2 - 16px);
        }

        .button__text::after {
            bottom: 0;
            left: 54px;

            width: 8px;
        }

        .button__line {
            position: absolute;
            top: 0;

            width: 56px;
            height: 100%;

            overflow: hidden;
        }

        .button__line::before {
            content: "";

            position: absolute;
            top: 0;

            width: 150%;
            height: 100%;

            border: solid 3px var(--line_color);
            border-radius: 300px;

            box-sizing: border-box;
        }

        .button__line:nth-child(1),
        .button__line:nth-child(1)::before {
            left: 0;
        }

        .button__line:nth-child(2),
        .button__line:nth-child(2)::before {
            right: 0;
        }

        .button:hover {
            letter-spacing: 5px;
        }

        .button:hover::before,
        .button:hover .button__text::before {
            width: 8px;
        }

        .button:hover::after,
        .button:hover .button__text::after {
            width: calc(100% - 56px * 2 - 16px);
        }

        .button__drow1,
        .button__drow2 {
            position: absolute;
            z-index: -1;

            height: 0;
            border-radius: 16px;

            transform-origin: 16px 16px;
        }

        .button__drow1 {
            top: -16px;
            left: 40px;

            width: 32px;

            transform: rotate(30deg);
        }

        .button__drow2 {
            top: 44px;
            left: 77px;

            width: 32px;

            transform: rotate(-127deg);
        }

        .button__drow1::before,
        .button__drow1::after,
        .button__drow2::before,
        .button__drow2::after {
            content: "";

            position: absolute;
        }

        .button__drow1::before {
            bottom: 0;
            left: 0;

            width: 0;
            height: 32px;

            border-radius: 16px;

            transform: rotate(-60deg);
            transform-origin: 16px 16px;
        }

        .button__drow1::after {
            top: -10px;
            left: 45px;

            width: 0;
            height: 32px;

            border-radius: 16px;

            transform: rotate(69deg);
            transform-origin: 16px 16px;
        }

        .button__drow2::before {
            bottom: 0;
            left: 0;

            width: 0;
            height: 32px;

            border-radius: 16px;

            transform: rotate(-146deg);
            transform-origin: 16px 16px;
        }

        .button__drow2::after {
            bottom: 26px;
            left: -40px;

            width: 0;
            height: 32px;

            border-radius: 16px;

            transform: rotate(-262deg);
            transform-origin: 16px 16px;
        }

        .button__drow1,
        .button__drow1::before,
        .button__drow1::after,
        .button__drow2,
        .button__drow2::before,
        .button__drow2::after {
            background: var(--back_color);
        }

        .button:hover .button__drow1 {
            animation: drow1 ease-in 0.06s forwards;
        }

        .button:hover .button__drow1::before {
            animation: drow2 linear 0.08s 0.06s forwards;
        }

        .button:hover .button__drow1::after {
            animation: drow3 linear 0.03s 0.14s forwards;
        }

        .button:hover .button__drow2 {
            animation: drow4 linear 0.06s 0.2s forwards;
        }

        .button:hover .button__drow2::before {
            animation: drow3 linear 0.03s 0.26s forwards;
        }

        .button:hover .button__drow2::after {
            animation: drow5 linear 0.06s 0.32s forwards;
        }

        @keyframes drow1 {
            from {
                height: 0;
            }

            to {
                height: 100px;
            }
        }

        @keyframes drow2 {
            0% {
                width: 0;
                opacity: 0;
            }

            10% {
                opacity: 0;
            }

            11% {
                opacity: 1;
            }

            100% {
                width: 120px;
            }
        }

        @keyframes drow3 {
            from {
                width: 0;
            }

            to {
                width: 80px;
            }
        }

        @keyframes drow4 {
            from {
                height: 0;
            }

            to {
                height: 120px;
            }
        }

        @keyframes drow5 {
            from {
                width: 0;
            }

            to {
                width: 124px;
            }
        }

        /* =========================
           スマートフォン
        ========================= */

        @media (max-width: 600px) {
            .loading-content {
                padding-bottom: 120px;
            }

            .flower {
                width: 140px;
            }

            .loading-text {
                font-size: 21px;
            }

            .wave-wrapper,
            .wave {
                height: 130px;
            }

            .button {
                width: 240px;
            }
        }
    </style>
</head>

<body>

    <div id="loading">

        <div class="loading-content">

            <img
                src="../../images/hibiscus.png"
                class="flower"
                alt="ハイビスカス"
            >

            <p class="loading-text">
                ゆんたく中...
            </p>

            <div id="startButton">

                <button
                    type="button"
                    class="button type--C"
                    id="enterButton"
                >
                    <span class="button__line"></span>
                    <span class="button__line"></span>

                    <span class="button__text">
                        おきとーーーーーーく
                    </span>

                    <span class="button__drow1"></span>
                    <span class="button__drow2"></span>
                </button>

            </div>

        </div>

        <div class="wave-wrapper">

            <img
                src="../../images/wave.svg"
                class="wave"
                alt=""
            >

        </div>

    </div>

    <script>
        const loading = document.getElementById("loading");
        const flower = document.querySelector(".flower");
        const loadingText = document.querySelector(".loading-text");
        const startButton = document.getElementById("startButton");
        const enterButton = document.getElementById("enterButton");

        const messages = [
            "ゆんたく中...",
            "沖縄のみんなと接続中...",
            "最新の投稿を集めています..."
        ];

        let messageIndex = 0;

        function changeMessage(message) {
            loadingText.classList.add("change");

            setTimeout(() => {
                loadingText.textContent = message;
                loadingText.classList.remove("change");
            }, 300);
        }

        const messageTimer = setInterval(() => {
            messageIndex = (messageIndex + 1) % messages.length;
            changeMessage(messages[messageIndex]);
        }, 900);

        // テスト用：3秒後に完了画面へ
        setTimeout(() => {
            clearInterval(messageTimer);

            flower.classList.add("stop");

            changeMessage("めんそ～れ～");

            setTimeout(() => {
                startButton.classList.add("show");
            }, 400);
        }, 3000);

        // ボタンを押したらタイムラインへ
        enterButton.addEventListener("click", () => {
            loading.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = "home.html";
            }, 600);
        });
    </script>

</body>

</html>
